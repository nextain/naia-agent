syntax = "proto3";
package naia.agent.v1;
// 임의 JSON 값(toolUse.args/gatewayApprovalRequest.args/tokenWarning.raw)은 google.protobuf.Value 대신
// JSON 문자열로 운반 — proto-loader 가 raw JS 값을 Value 로 직렬화 시 객체가 빈값으로 유실됨(codex 실측). JSON=무손실.

// ── new-naia os↔agent 단일 transport 계약 (정본: naia-os --gRPC--> naia-agent --저장/불러오기--> naia-adk).
// 직교: 이 proto = 가로(gRPC 경계). 도메인(chat-turn-handler 등)은 이 proto 를 모름 — adapter 가 proto↔domain 매핑.
// 현 stdio wire(protocol.ts decodeRequest/encodeEmit) 의 충실한 이식(추가 아닌 교체). codex R1 반영.
service NaiaAgent {
  // 기동/설정: os 가 워크스페이스 경로 주입 → agent 가 naia-adk/naia-settings 로 provider/모델 로딩.
  // 라이브 변경(사용자 모델 교체) = OS 가 naia-settings 갱신 후 재호출(멱등). (R1-2: startup-only 금지)
  rpc SetWorkspace(SetWorkspaceRequest) returns (SetWorkspaceResult);
  rpc ReloadSettings(ReloadSettingsRequest) returns (SetWorkspaceResult);

  // UC-KNOWLEDGE-COMPILE (FR-KB-5): naia-os 설정 지식 탭이 등록한 소스 폴더(naia-settings/knowledge.json) →
  //   kb-compiler compile → naia-adk knowledge/<scope>/kb.json 영속. 셸 "지금 컴파일" 버튼이 호출(additive RPC).
  rpc CompileKnowledge(CompileKnowledgeRequest) returns (CompileKnowledgeResult);

  // 대화: 메시지만(provider 미포함 — 정본). 응답 = AgentEvent server-stream(현 AgentEmit 1:1).
  rpc Chat(ChatRequest) returns (stream AgentEvent);

  rpc Cancel(CancelRequest) returns (Ack);
  // Durable, isolated Codex coding workers.  These are intentionally separate
  // from Chat/Cancel request ids and do not claim resume without a checkpoint.
  rpc StartCodingJob(StartCodingJobRequest) returns (CodingJob);
  rpc GetCodingJob(GetCodingJobRequest) returns (CodingJob);
  rpc ListCodingJobs(ListCodingJobsRequest) returns (CodingJobList);
  rpc CancelCodingJob(CancelCodingJobRequest) returns (CodingJob);
  rpc ResumeCodingJob(ResumeCodingJobRequest) returns (CodingJob);
  rpc ApprovalResponse(ApprovalResponseRequest) returns (Ack);
  rpc UpdateCreds(CredsUpdate) returns (Ack);          // 키체인 overlay(런타임 우선)
  // 구 standalone tool_request — new-core 미지원: 즉시 error 이벤트(셸 120s 행 방지). (R1-4)
  rpc ToolRequest(ToolRequestControl) returns (stream AgentEvent);

  // F1 rich-health(신규계약): agent version/uptime/health. os InteroceptivePort.diagnostics rich payload.
  //   (os-local agentReachable=기본 health; 이 RPC=상세 payload. Rust os-client=후속.)
  rpc Diagnostics(DiagnosticsRequest) returns (DiagnosticsResult);
  rpc Shutdown(ShutdownRequest) returns (Ack);

  // UC-PANEL (FR-PANEL): 환경 panel skill(BGM·브라우저·workspace). 셸이 도구를 등록 → agent 가 LLM 에 노출,
  //   LLM tool call 시 panel_tool_call(AgentEvent) emit → 셸 실행 → PanelToolResult 로 결과 주입(E1: agent 는 환경 미실행).
  rpc RegisterPanelSkills(PanelSkills) returns (Ack);    // FR-PANEL-1 panel 활성화 — 동적 도구 등록
  rpc ClearPanelSkills(PanelId) returns (Ack);           // FR-PANEL-1 panel 비활성화 — 도구 제거
  rpc ListSkills(ListSkillsRequest) returns (SkillList); // 현재 노출 도구 목록(voice 세션 — 옛 fetchAgentSkills)
  rpc PanelToolResult(PanelToolResultMsg) returns (Ack); // FR-PANEL-3 셸 실행 결과 → chat 루프 주입

  // UC-CONTINUE-SPEAKING #82 — 사용자 입력 없는 profile activity.
  rpc ConfigureSpeechProfile(ConfigureSpeechProfileRequest) returns (Ack);
  rpc SubscribeSpeechActivities(SpeechActivitySubscription) returns (stream AgentEvent);
  rpc YieldSpeechActivity(YieldSpeechActivityRequest) returns (YieldSpeechActivityResult);
  rpc ControlSpeechActivity(ControlSpeechActivityRequest) returns (Ack);
  rpc StopSpeechActivity(StopSpeechActivityRequest) returns (Ack);
}

message Ack { bool ok = 1; }
message ShutdownRequest { string nonce = 1; }
message DiagnosticsRequest {}
message DiagnosticsResult { string version = 1; int64 uptime_ms = 2; bool healthy = 3; repeated DiagComponent components = 4; }
message DiagComponent { string name = 1; bool healthy = 2; }

message SetWorkspaceRequest { string adk_path = 1; }
message ReloadSettingsRequest {}
message SetWorkspaceResult {
  bool loaded = 1;            // naia-adk 에서 provider/model 로딩 성공?
  string provider = 2;
  string model = 3;
  repeated EffectiveLlmConfig effective_llm_configs = 4;
}
enum ConfigProvenance { CONFIG_PROVENANCE_UNSPECIFIED = 0; EXPLICIT = 1; INHERIT = 2; LEGACY_INHERIT = 3; DEFAULT = 4; }
enum LlmRole { LLM_ROLE_UNSPECIFIED = 0; MAIN = 1; SUB = 2; MEMORY = 3; }
message ResolvedConfigValue { string value = 1; ConfigProvenance provenance = 2; optional LlmRole inherited_from_role = 3; }
message EffectiveLlmConfig { LlmRole role = 1; ResolvedConfigValue provider = 2; ResolvedConfigValue model = 3; optional ResolvedConfigValue credential_ref = 4; }

// UC-KNOWLEDGE-COMPILE (FR-KB-5): 컴파일 트리거 + 통계. adk_path 미지정 시 현 워크스페이스 사용(entry).
message CompileKnowledgeRequest { string adk_path = 1; }
message CompileKnowledgeResult {
  bool ok = 1;                // 컴파일 성공(소스 0/오류 = false)
  string scope = 2;           // 컴파일된 지식 스코프(knowledge/<scope>/kb.json)
  int32 source_count = 3;
  int32 card_count = 4;
  int32 entity_count = 5;
  int32 relation_count = 6;
  optional string error = 7;  // 실패 사유(정직 표기 — 셸이 표시)
}

message Message {
  string role = 1;
  string content = 2;
  optional string tool_call_id = 3;
  repeated AttachmentRef attachments = 4;
}
message AttachmentRef { string id = 1; string kind = 2; string mime_type = 3; int64 size_bytes = 4; string local_ref = 5; }
message ShellChannel {}
message DiscordChannel { string binding_id = 1; string guild_id = 2; string channel_id = 3; string user_id = 4; }
message ChannelContext { oneof channel { ShellChannel shell = 1; DiscordChannel discord = 2; } }
enum GroundingPolicy { GROUNDING_POLICY_UNSPECIFIED = 0; OFF = 1; AVAILABLE = 2; REQUIRED = 3; }
message GroundingRequest { GroundingPolicy policy = 1; string knowledge_scope = 2; }
enum ProviderSessionMode { PROVIDER_SESSION_MODE_UNSPECIFIED = 0; NEW = 1; RESUME = 2; }
message ProviderSessionRequest { ProviderSessionMode mode = 1; optional string provider_session_ref = 2; }
message ProcessingRequest { string processing_profile_ref = 1; }
enum ProcessingDestination {
  PROCESSING_DESTINATION_UNSPECIFIED = 0;
  LOCAL_DEVICE = 1;
  PRIVATE_MANAGED = 2;
  EXTERNAL_CLOUD = 3;
}
enum ProcessingWorkload {
  PROCESSING_WORKLOAD_UNSPECIFIED = 0;
  MAIN_LLM = 1;
  SUB_LLM = 2;
  MEMORY_LLM = 3;
  EMBEDDING = 4;
  NETWORK_TOOL = 5;
}
enum ProcessingDecision {
  PROCESSING_DECISION_UNSPECIFIED = 0;
  ALLOWED = 1;
  BLOCKED = 2;
  CONFIRMATION_REQUIRED = 3;
}

// 현 protocol.ts chat_request 전 필드 보존 (R1-1: enableThinking/gatewayUrl/disabledSkills 누락 금지). provider 제거(정본).
message ChatRequest {
  string request_id = 1;
  repeated Message messages = 2;
  optional string system_prompt = 3;
  optional bool enable_tools = 4;
  optional bool enable_thinking = 5;      // handler 가 소비 — 누락 시 회귀
  optional string gateway_url = 6;
  repeated string disabled_skills = 7;
  optional string session_id = 8;         // 대화별 세션 id(shell localSessionId) — agent transcript 세션 파일 분리 키(FR-CONV.2). 누락=단일 fallback.
  // S4 — 클라(naia-os) 환경 세그먼트(아바타 감정·패널). args_json/raw_json 과 동형으로 **JSON 문자열** 운반
  // (proto-loader 가 구조화 값을 Value 로 직렬화하면 객체 유실 — 본 proto 상단 주석 참조). 코어가 화이트리스트 디코드.
  optional string environment_segments_json = 9;
  optional ActivityResume activity_resume = 10; // yield 뒤 profile-bound Q&A 결속
  optional ChannelContext channel = 11;
  optional GroundingRequest grounding = 12;
  optional ProviderSessionRequest provider_session = 13;
  optional ProcessingRequest processing = 14;
}

message ActivityResume {
  string activity_id = 1;
  int64 profile_generation = 2;
  int64 yield_generation = 3;
  string resume_token = 4;
}
message CancelRequest { string request_id = 1; optional string activity_id = 2; }
enum CodingJobState {
  CODING_JOB_STATE_UNSPECIFIED = 0;
  QUEUED = 1;
  RUNNING = 2;
  CANCELLING = 3;
  CANCELLED = 4;
  COMPLETED = 5;
  FAILED = 6;
}
message CodingJob {
  string job_id = 1;
  string workspace_path = 2;
  string worktree_path = 3;
  string branch = 4;
  CodingJobState state = 5;
  string created_at = 6;
  string updated_at = 7;
  optional string error = 8;
  optional string model = 9;
  bool resumable = 10;
}
message StartCodingJobRequest { string workspace_path = 1; string task = 2; optional string model = 3; }
message GetCodingJobRequest { string job_id = 1; }
message ListCodingJobsRequest { optional string workspace_path = 1; }
message CodingJobList { repeated CodingJob jobs = 1; }
message CancelCodingJobRequest { string job_id = 1; }
message ResumeCodingJobRequest { string job_id = 1; }
message ApprovalResponseRequest {
  string request_id = 1; string tool_call_id = 2;
  enum Decision { REJECT = 0; APPROVE = 1; }
  Decision decision = 3;
}
message CredsUpdate {
  string provider = 1;
  optional string api_key = 2;
  optional string naia_key = 3;
}
message ToolRequestControl { string request_id = 1; string tool_name = 2; }

// AgentEmit 12종 1:1 무손실(R1-3). args/raw = google.protobuf.Value, usage cost/model = optional(presence 보존).
message AgentEvent {
  string request_id = 1;
  oneof event {
    TextEvent text = 2;
    TextEvent thinking = 3;
    ToolUseEvent tool_use = 4;
    ToolResultEvent tool_result = 5;
    ApprovalRequestEvent approval_request = 6;
    GatewayApprovalRequestEvent gateway_approval_request = 7;
    UsageEvent usage = 8;
    LogEntryEvent log_entry = 9;
    TokenWarningEvent token_warning = 10;
    FinishEvent finish = 11;
    ErrorEvent error = 12;
    CompactedEvent compacted = 13;   // UC-compaction(FR-COMPACT): 예산 압박 시 head 요약 발생 알림(비-terminal)
    PanelToolCallEvent panel_tool_call = 14; // UC-PANEL FR-PANEL-2: LLM 이 panel(환경) 도구 호출 → 셸에 위임(agent 미실행)
    GroundingEvent grounding = 17;
    ArtifactEvent artifact = 18;
    ProviderSessionEvent provider_session = 19;
    ProcessingDisclosureEvent processing_disclosure = 20;
  }
  optional string activity_id = 15;       // self-init activity correlation
  optional int64 profile_generation = 16; // stale activity text/audio 폐기
}
message TextEvent { string text = 1; }
message ToolUseEvent { string tool_call_id = 1; string tool_name = 2; string args_json = 3; }   // args = JSON 문자열(무손실)
message ToolResultEvent { string tool_call_id = 1; string output = 2; string tool_name = 3; bool success = 4; } // UC1 리뷰: success/toolName 보존(os ChatPanel chunk.success)
message ApprovalRequestEvent { string tool_call_id = 1; string tool_name = 2; int32 tier = 3; string args_json = 4; string description = 5; } // UC1 리뷰: args/description(blind approval 방지)
message GatewayApprovalRequestEvent { string tool_call_id = 1; string tool_name = 2; string args_json = 3; }
message UsageEvent { int64 input_tokens = 1; int64 output_tokens = 2; optional double cost = 3; optional string model = 4; }
message LogEntryEvent { string level = 1; string message = 2; }
message TokenWarningEvent { string raw_json = 1; }
message FinishEvent {}
enum GroundingStatus { GROUNDING_STATUS_UNSPECIFIED = 0; GROUNDED = 1; NO_EVIDENCE = 2; UNCOMPILED = 3; UNAVAILABLE = 4; }
message GroundingSource { string title = 1; repeated string source_uris = 2; }
message GroundingEvent { GroundingStatus status = 1; repeated GroundingSource sources = 2; }
message ImageArtifact { string id = 1; string kind = 2; string mime_type = 3; int64 size_bytes = 4; string local_ref = 5; optional string name = 6; }
message ArtifactEvent { ImageArtifact artifact = 1; }
enum ProviderSessionState { PROVIDER_SESSION_STATE_UNSPECIFIED = 0; STARTED = 1; RESUMED = 2; CLOSED = 3; }
message ProviderSessionEvent { string session_id = 1; string provider_session_ref = 2; ProviderSessionState state = 3; }
message ProcessingDisclosureEvent {
  ProcessingWorkload workload = 1;
  ProcessingDestination destination = 2;
  ProcessingDecision decision = 3;
  string processing_profile_ref = 4;
  optional string provider = 5;
  optional string model = 6;
}
enum WireErrorCode {
  WIRE_ERROR_CODE_UNSPECIFIED = 0;
  PROVIDER_NOT_INSTALLED = 1; PROVIDER_LOGIN_REQUIRED = 2; PROVIDER_AUTH_EXPIRED = 3; PROVIDER_NETWORK = 4;
  DISCORD_TOKEN_MISSING = 5; DISCORD_INTENTS_MISSING = 6; DISCORD_NOT_INSTALLED = 7; DISCORD_PERMISSION_DENIED = 8; DISCORD_RATE_LIMITED = 9;
  ATTACHMENT_UNSUPPORTED_TYPE = 10; ATTACHMENT_TOO_LARGE = 11; ATTACHMENT_INVALID_REF = 12;
  KNOWLEDGE_UNCOMPILED = 13; KNOWLEDGE_UNAVAILABLE = 14; WIRE_INVALID_ARGUMENT = 15; WIRE_UNSUPPORTED_ENUM = 16;
  WIRE_SCOPE_FORBIDDEN = 17; PROVIDER_SESSION_MISMATCH = 18; PROVIDER_SESSION_EXPIRED = 19; PROVIDER_SESSION_CLOSED = 20;
  PROCESSING_PROFILE_REQUIRED = 21; PROCESSING_DESTINATION_UNKNOWN = 22;
  EXTERNAL_PROCESSING_FORBIDDEN = 23; EXTERNAL_PROCESSING_CONFIRMATION_REQUIRED = 24;
}
message ErrorEvent { string message = 1; optional WireErrorCode code = 2; }
message CompactedEvent { int64 dropped_count = 1; }

// ── UC-PANEL (FR-PANEL): 환경 panel skill (BGM·브라우저·workspace) ──────────────────
// ToolSpec.parameters_json = JSON Schema 문자열(args_json 과 동형, 무손실). tier = 승인 게이트(미설정/0=none).
message ToolSpec { string name = 1; string description = 2; string parameters_json = 3; optional int32 tier = 4; }
message PanelSkills { string panel_id = 1; repeated ToolSpec tools = 2; }   // FR-PANEL-1 등록
message PanelId { string panel_id = 1; }                                     // FR-PANEL-1 제거
message ListSkillsRequest {}
message SkillList { repeated ToolSpec tools = 1; }                           // 현재 노출 도구
message PanelToolResultMsg { string request_id = 1; string tool_call_id = 2; string output = 3; bool success = 4; optional string activity_id = 5; } // FR-PANEL-3 결과 주입
message PanelToolCallEvent { string tool_call_id = 1; string tool_name = 2; string args_json = 3; } // FR-PANEL-2 위임(args=JSON 무손실, ToolUseEvent 동형)

// ── UC-CONTINUE-SPEAKING #82 proactive profiles ───────────────────────────────
message ConfigureSpeechProfileRequest {
  string session_id = 1;
  oneof profile {
    DisabledSpeechProfile disabled = 2;
    PersonalRadioDjProfile personal_radio_dj = 3;
    ExhibitionIntroProfile exhibition_intro = 4;
  }
}
message DisabledSpeechProfile {}
message PersonalRadioDjProfile {
  int64 idle_ms = 1;
  int64 dj_interval_ms = 2;
  string timezone = 3;
  bool bgm_auto_play_opt_in = 4;
  optional double weather_latitude = 5;
  optional double weather_longitude = 6;
  bool weather_consented = 7;
}
message ExhibitionIntroProfile {
  string knowledge_scope = 1;
  int64 idle_ms = 2;
  int64 intro_interval_ms = 3;
}
message SpeechActivitySubscription { string session_id = 1; }
message YieldSpeechActivityRequest { string session_id = 1; string activity_id = 2; }
message YieldSpeechActivityResult {
  bool ok = 1;
  string resume_token = 2;
  int64 profile_generation = 3;
  int64 yield_generation = 4;
}
message StopSpeechActivityRequest { string session_id = 1; optional string activity_id = 2; }
message ControlSpeechActivityRequest {
  string session_id = 1;
  optional string activity_id = 2;
  string action = 3;
}
