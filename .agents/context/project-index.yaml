# opt-in localmodel backends (2026-05-15)
# naia-agent optionally calls these external voice/modal backends. Not always-on — vertical-specific.
# These do NOT import naia-agent; they conform to naia-agent's localmodel API contract.
# RAG / context / long-term memory / domain knowledge = naia-agent / naia-memory responsibility (NOT backends).
opt_in_localmodels:
  - name: naia-ko-serve
    repo: nextain/naia-ko-serve
    visibility: private (nextain org)
    provides: Korean full-duplex voice dialogue backend (MiniCPM-o-4.5 ko fine-tune) + quality benchmarks
    api: HTTPS /ws/duplex (sid prefix adx_*), /v1/realtime-style
    selected_via: naia-adk localmodel config (opt-in)
    boundary: ko-serve = model serving + system prompt + benchmarks only. RAG/context/memory = naia-agent.
  - name: naia-sing
    repo: nextain/naia-sing
    visibility: private (nextain org)
    provides: singing (SVS) backend — ref voice + song → user-voice singing
    selected_via: naia-adk localmodel config (opt-in)

# Context priority (on conflict)
priority:
  - .agents/context/agents-rules.json
  - CLAUDE.md
  - AGENTS.md
  - .agents/context/project-index.yaml
