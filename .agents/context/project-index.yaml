project: naia-agent
version: 0.1.0
updated: 2026-04-25
phase: R0 (design re-check)
description: |
  4-repo Naia 생태계의 허브 런타임. Interfaces, not dependencies — 공개 인터페이스로만
  결합, 런타임 결합 금지. 호스트가 구현체 주입.

# 진입점 — 코드 만지기 전 읽을 순서
entry_points:
  - file: AGENTS.md
    purpose: 일반 진입 + 작업 규칙
  - file: CLAUDE.md
    purpose: Claude 전용 추가 규칙
  - file: .agents/progress/design-recheck-2026-04-25.md
    purpose: 현 R0 메인 산출물 (어디까지 결정됐고 어디부터 진행)
  - file: .agents/progress/ref-adoption-matrix.md
    purpose: 8개 ref + cc 분석 통합 채택 매트릭스
  - file: .agents/progress/runnable-testable-gap.md
    purpose: 현 표면 vs progressive runnable+testable 만족도

# 정규 디자인 문서 (R0는 수정하지 않음)
canonical_docs:
  - file: docs/ARCHITECTURE.md
    purpose: 전체 아키텍처 + 패키지 맵
    immutable_in_r0: true
  - file: docs/agent-loop-design.md
    purpose: Agent 루프 D1~D8 결정
    immutable_in_r0: true
    extension_only: ref-adoption-matrix.md §D
  - file: docs/hosting-guide.md
    purpose: 임베드 가이드 (5분~20분)
  - file: docs/memory-provider-audit.md
    purpose: 메모리 façade 감사
  - file: docs/voice-pipeline-audit.md
    purpose: 음성 파이프라인 감사 (Option C 결정)

# 상위 컨텍스트 (alpha-adk)
upstream_context:
  - file: ../../alpha-adk/.agents/progress/naia-4repo-migration-plan.md
    purpose: 4-repo plan v7.2 Part A — 정규 SoT
    immutable: true
  - file: ../../alpha-adk/.agents/progress/direction-2026-04-25.md
    purpose: 이번 R0 트리거 directive
  - file: ../../alpha-adk/CLAUDE.md
    purpose: alpha-adk 루트 mandatory reads

# 패키지 (6개)
packages:
  - name: '@nextain/agent-types'
    path: packages/types
    role: 계약 (zero-runtime-dep)
    status: v0.1.0 freeze
  - name: '@nextain/agent-protocol'
    path: packages/protocol
    role: wire (zero-runtime-dep)
    status: v0.1.0 freeze
    tests: 73 unit (Phase A)
  - name: '@nextain/agent-core'
    path: packages/core
    role: Agent 루프
    status: WIP
    tests: 23 unit (Phase B + C.2)
  - name: '@nextain/agent-runtime'
    path: packages/runtime
    role: 도구 + skill loader
    status: WIP
    tests: 93 unit (Phase B)
  - name: '@nextain/agent-providers'
    path: packages/providers
    role: LLMClient (Anthropic)
    status: implemented
    tests: smoke + 15 unit (X1 adapter)
  - name: '@nextain/agent-observability'
    path: packages/observability
    role: Logger/Tracer/Meter 기본 구현
    status: implemented
    tests: 0 (drift E02 — gap G05 sub-issue #7)

# 진행 산출물 (R0)
progress_outputs:
  matrix: .agents/progress/ref-adoption-matrix.md
  gap: .agents/progress/runnable-testable-gap.md
  design_recheck: .agents/progress/design-recheck-2026-04-25.md
  ref_reviews:
    - .agents/progress/refs/cline-review.md
    - .agents/progress/refs/jikime-adk-review.md
    - .agents/progress/refs/jikime-mem-review.md
    - .agents/progress/refs/moltbot-review.md
    - .agents/progress/refs/openclaw-review.md
    - .agents/progress/refs/opencode-review.md
    - .agents/progress/refs/project-airi-review.md
    - .agents/progress/refs/cc-review.md

# 레퍼런스 (8개 ref + 1 분석 파일)
references:
  ref_submodules:
    - path: ../refs/ref-cline
      url: https://github.com/cline/cline
      visibility: public
      role_for_us: pattern reference (IDE plugin, embeddable runtime과 직교)
      review: .agents/progress/refs/cline-review.md
    - path: ../refs/ref-jikime-adk
      url: https://github.com/jikime/jikime-adk
      visibility: public
      role_for_us: pattern reference (Go-based migration ADK, 별개 layer)
      review: .agents/progress/refs/jikime-adk-review.md
    - path: ../refs/ref-jikime-mem
      url: https://github.com/jikime/jikime-mem
      visibility: public
      role_for_us: pattern reference (모놀리식 memory plugin, 직접 차용 안 함)
      review: .agents/progress/refs/jikime-mem-review.md
    - path: ../refs/ref-moltbot
      url: https://github.com/moltbot/moltbot
      visibility: public
      role_for_us: pattern reference (messenger gateway, ChannelPlugin 패턴만)
      review: .agents/progress/refs/moltbot-review.md
    - path: ../refs/ref-openclaw
      url: https://github.com/qwibitai/nanoclaw
      visibility: public
      role_for_us: prior analysis baseline + nanoclaw v2 변동 추적
      review: .agents/progress/refs/openclaw-review.md
      prior_analysis: ../../alpha-adk/.agents/progress/issue-186-openclaw-analysis.md
    - path: ../refs/ref-opencode
      url: https://github.com/sst/opencode
      visibility: public
      role_for_us: 핵심 reference (D1/D2/D3 영향, 추가 채택 4건)
      review: .agents/progress/refs/opencode-review.md
    - path: ../refs/ref-project-airi
      url: https://github.com/moeru-ai/airi
      visibility: public
      role_for_us: voice pipeline + VRM viseme reference
      review: .agents/progress/refs/project-airi-review.md
    - path: ../refs/ref-cc
      url: https://github.com/nextain/ref-cc
      visibility: private (nextain org)
      role_for_us: claude-code 분석 docs (원본 source 1,884 files 유실)
      review: .agents/progress/refs/cc-review.md
      modification: forbidden (F03)
      sensitive: true
    - path: ../refs/ref-cc-cleanroom
      url: https://github.com/ghuntley/claude-code-source-code-deobfuscation
      visibility: public
      role_for_us: claude-code cleanroom (ghuntley, 2025-03 0.2.x 시절, 패턴 reference만)
      review: .agents/progress/refs/cc-review.md
      license: All rights reserved (LICENSE 없음)
      restriction: code copying/redistribution 금지 (F04)

  analysis_only:
    - file: ../../alpha-adk/.agents/progress/11-ref-cc-analysis.json
      role: claude-code 15-agent 3라운드 분석 메타정보
      cross_link_pending: F01 (cc-review.md로 부분 해소)

